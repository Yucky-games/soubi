<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブルアカ装備在庫管理アプリ</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f0f4f8; color: #333; margin: 20px; }
        h1 { color: #005bac; border-bottom: 2px solid #005bac; padding-bottom: 10px; }
        h2 { font-size: 1.2rem; margin-top: 30px; color: #444; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* [1] 確保人数入力 */
        .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; margin-bottom: 4px; font-weight: bold; color: #555; }
        .input-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        /* テーブル共通 */
        table { border-collapse: collapse; width: 100%; margin-top: 10px; font-size: 0.9rem; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #e9ecef; position: sticky; top: 0; }
        .row-label { text-align: left; font-weight: bold; background-color: #f8f9fa; width: 120px; }
        input[type="number"] { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 3px; text-align: right; }
        
        /* ボタン */
        .btn-calc { display: block; width: 240px; margin: 40px auto; padding: 15px; background-color: #005bac; color: white; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 0 #003d73; }
        .btn-calc:hover { background-color: #004488; transform: translateY(1px); box-shadow: 0 3px 0 #003d73; }
        .btn-calc:active { transform: translateY(4px); box-shadow: none; }
