<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装備在庫カンリくん</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; position: relative; }
        .container { max-width: 1100px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        
        .credit { position: absolute; top: 15px; right: 20px; font-size: 0.85rem; color: #666; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
        .credit:hover { color: #005bac; border-bottom: 1px solid #005bac; }

        h1 { color: #005bac; font-size: 1.6rem; border-bottom: 2px solid #005bac; padding-bottom: 10px; margin-top: 0; padding-right: 120px; }
        h2 { font-size: 1rem; margin-top: 25px; color: #666; background: #f0f4f8; padding: 8px; border-radius: 4px; }
        .sub-desc { font-size: 0.75rem; font-weight: normal; color: #888; margin-left: 10px; }
        
        .grid-targets { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .target-box { display: flex; flex-direction: column; }
        .target-box label { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        .target-box input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .scroll-x { overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; background: #fff; }
        table { border-collapse: collapse; width: 100%; min-width: 800px; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; }
        .row-label { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; width: 120px; }
        input[type="number"] { width: 80%; padding: 5px; border: 1px solid #ddd; border-radius: 3px; text-align: right; }

        #inventory-body tr:nth-child(even), #inventory-body tr:nth-child(even) .row-label { background-color: #fffde7; }

        .btn-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 160px; }
        .btn-calc { background: #005bac; color: #fff; width: 220px; }
        
        .retro-font { font-family: 'DotGothic16', sans-serif !important; letter-spacing: 1px; }
        .btn-jumon { background: #6f42c1; color: #fff; box-shadow: 0 4px 0 #4e2e8a; }
        .btn-jumon:hover { background: #5a32a3; transform: translateY(1px); }

        .btn-copy { background: #6c757d; color: #fff; box-shadow: 0 4px 0 #495057; }
        .btn-ss { background: #28a745; color: #fff; box-shadow: 0 4px 0 #1e7e34; }

        /* 入力エリアのスタイル調整 */
        #jumon-input-area { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 15px; display: none; border: 2px solid #6f42c1; }
        #jumon-text-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; font-family: monospace; box-sizing: border-box; }
        .jumon-help-text { font-size: 0.8rem; color: #666; margin-top: 5px; margin-bottom: 15px; line-height: 1.5; }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:25px; border-radius:12px; max-width:500px; width:90%; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-msg-main { font-weight: bold; margin-bottom: 8px; display: block; font-size: 1rem; }
        .modal-msg-sub { font-size: 0.8rem; color: #666; display: block; margin-bottom: 20px; line-height: 1.5; }
        .jumon-display { background: #f0f0f0; padding: 10px; border-radius: 5px; font-family: monospace; word-break: break-all; margin-bottom: 20px; border: 1px solid #ddd; max-height: 100px; overflow-y: auto; }

        .bg-red { background-color: #ffebed !important; color: #d32f2f; font-weight: bold; }
        .bg-yellow { background-color: #fffde7 !important; color: #856404; font-weight: bold; }
        .bg-green { background-color: #f1fbf2 !important; color: #2e7d32; }
        .summary-header { background: #f0f4f8; font-weight: bold; }
        .no-scroll { overflow: visible !important; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://x.com/yucky_games" target="_blank" rel="noopener noreferrer" class="credit">made by ゆっきー</a>
    <h1>装備在庫カンリくん</h1>

    <h2>[1] 各装備の確保人数を設定</h2>
    <div id="target-inputs" class="grid-targets"></div>

    <h2>[2] 所持数・ボックス入力 (T2〜T10)</h2>
    <div class="scroll-x">
        <table>
            <thead><tr id="table-head"><th>アイテム</th></tr></thead>
            <tbody id="inventory-body"></tbody>
        </table>
    </div>

    <div class="btn-container">
        <button class="btn btn-calc" onclick="runCalculation()">計算＆保存</button>
        <button class="btn btn-jumon retro-font" onclick="toggleJumonInput()">ふっかつのじゅもんを入力する</button>
    </div>

    <div id="jumon-input-area">
        <p class="retro-font" style="margin-top:0; font-size: 1rem; font-weight: bold; color: #6f42c1; margin-bottom: 5px;">「ふっかつのじゅもん」を貼り付けてください</p>
        <p class="retro-font jumon-help-text">
            ふっかつのじゅもんとは？<br>
            「計算する」を実行したときに作成した「ふっかつのじゅもん」を入力すると、前回の入力内容を復元できます
        </p>
        <input type="text" id="jumon-text-input" placeholder="ここに英数字列を貼り付け">
        <button class="btn btn-ss" style="width:100%;" onclick="restoreFromJumon()">ふっかつする</button>
    </div>

    <div id="result-area" style="display:none;">
        <div id="capture-target" style="padding: 20px; background: white; border-radius: 8px;">
            <h2 id="result-title" style="margin-top:0; background: none; border-bottom: 2px solid #eee;">計算結果</h2>
            <div class="scroll-x" id="table-wrapper">
                <table>
                    <thead><tr id="result-head"><th>アイテム</th></tr></thead>
                    <tbody id="result-body"></tbody>
                    <tbody id="summary-body"></tbody>
                </table>
            </div>
        </div>
        
        <div class="btn-container">
            <button id="copy-btn" class="btn btn-copy" onclick="copyScreenshot()">画像としてコピー</button>
            <button class="btn btn-ss" onclick="takeScreenshot()">画像として保存 (PNG)</button>
            <button class="btn btn-jumon retro-font" onclick="showExportModal()">じゅもんを発行</button>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <span class="modal-msg-main">この文字列、またはURLを保存してください。</span>
        <span class="modal-msg-sub">URLからアクセスするか、「ふっかつのじゅもんを入力する」に入力すれば現在の情報を復元できます。</span>
        <div id="jumon-str" class="jumon-display"></div>
        <div class="btn-container" style="margin-top:0;">
            <button class="btn btn-ss" style="min-width:120px;" onclick="copyToClipboard('url')">URLをコピー</button>
            <button class="btn btn-copy" style="min-width:120px;" onclick="copyToClipboard('jumon')">じゅもんのみ</button>
            <button class="btn" style="min-width:120px; background:#ccc;" onclick="closeModal()">閉じる</button>
        </div>
    </div>
</div>

<script>
    const EQUIP_LIST = [
        { name: "帽子", def: 3 }, { name: "手袋", def: 2 }, { name: "靴", def: 3 },
        { name: "バッグ", def: 2 }, { name: "バッジ", def: 2 }, { name: "ヘアピン", def: 4 },
        { name: "お守り", def: 1 }, { name: "時計", def: 4 }, { name: "ネックレス", def: 2 }
    ];
    const REQ_PER_PERSON = { 2: 40, 3: 45, 4: 50, 5: 55, 6: 65, 7: 65, 8: 60, 9: 50, 10: 60 };
    const TIERS = [2, 3, 4, 5, 6, 7, 8, 9, 10];
    const STORAGE_KEY = 'ba_equip_manager_data';

    function initApp() {
        const targetDiv = document.getElementById('target-inputs');
        const invBody = document.getElementById('inventory-body');
        const tableHead = document.getElementById('table-head');
        const resultHead = document.getElementById('result-head');
        TIERS.forEach(t => {
            const th = document.createElement('th');
            th.innerText = 'T' + t;
            tableHead.appendChild(th);
            resultHead.appendChild(th.cloneNode(true));
        });
        EQUIP_LIST.forEach((eq, i) => {
            targetDiv.innerHTML += `<div class="target-box"><label>${eq.name}</label><input type="number" id="target-${i}" value="${eq.def}" min="0" onfocus="this.select()"></div>`;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => row += `<td><input type="number" id="inv-${i}-${t}" value="0" min="0" onfocus="this.select()"></td>`);
            invBody.innerHTML += row + `</tr>`;
        });
        let boxRow = `<tr><td class="row-label">選択ボックス</td>`;
        TIERS.forEach(t => boxRow += `<td><input type="number" id="box-${t}" value="0" min="0" onfocus="this.select()"></td>`);
        invBody.innerHTML += boxRow + `</tr>`;
        const hash = window.location.hash.substring(1);
        if (hash) { if (loadFromDataString(hash)) runCalculation(); } 
        else { const saved = localStorage.getItem(STORAGE_KEY); if (saved) loadFromDataString(saved); }
    }

    function generateDataString() {
        const data = [];
        EQUIP_LIST.forEach((_, i) => data.push(parseInt(document.getElementById(`target-${i}`).value) || 0));
        EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => data.push(parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0)));
        TIERS.forEach(t => data.push(parseInt(document.getElementById(`box-${t}`).value) || 0));
        let bytes = [];
        data.forEach(v => {
            while (v >= 0x80) { bytes.push((v & 0x7f) | 0x80); v >>>= 7; }
            bytes.push(v);
        });
        const compressed = pako.deflate(new Uint8Array(bytes));
        return btoa(String.fromCharCode(...compressed)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function loadFromDataString(str) {
        try {
            const jumon = str.replace(/-/g, '+').replace(/_/g, '/');
            const bin = atob(jumon);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const decompressed = pako.inflate(bytes);
            let data = [], i = 0;
            while (i < decompressed.length) {
                let v = 0, shift = 0, b;
                do { b = decompressed[i++]; v |= (b & 0x7f) << shift; shift += 7; } while (b & 0x80);
                data.push(v);
            }
            const expectedLen = EQUIP_LIST.length + (EQUIP_LIST.length * TIERS.length) + TIERS.length;
            if (data.length !== expectedLen) return false;
            let ptr = 0;
            EQUIP_LIST.forEach((_, i) => document.getElementById(`target-${i}`).value = data[ptr++]);
            EQUIP_LIST.forEach((_, i) => TIERS.forEach(t => document.getElementById(`inv-${i}-${t}`).value = data[ptr++]));
            TIERS.forEach(t => document.getElementById(`box-${t}`).value = data[ptr++]);
            return true;
        } catch (e) { return false; }
    }

    function runCalculation() {
        const resArea = document.getElementById('result-area');
        const resBody = document.getElementById('result-body');
        const sumBody = document.getElementById('summary-body');
        const resultTitle = document.getElementById('result-title');
        const now = new Date();
        resultTitle.innerText = `計算結果：目標との差分（${now.getMonth() + 1}月${now.getDate()}日時点）`;
        resBody.innerHTML = ""; sumBody.innerHTML = "";
        let tDeficits = {}; TIERS.forEach(t => tDeficits[t] = 0);
        EQUIP_LIST.forEach((eq, i) => {
            const targetNum = parseInt(document.getElementById(`target-${i}`).value) || 0;
            let row = `<tr><td class="row-label">${eq.name}</td>`;
            TIERS.forEach(t => {
                const goal = REQ_PER_PERSON[t] * targetNum;
                const have = parseInt(document.getElementById(`inv-${i}-${t}`).value) || 0;
                const diff = have - goal;
                let cls = diff < 0 ? "bg-red" : (diff < 100 ? "bg-yellow" : "bg-green");
                if (diff < 0) tDeficits[t] += diff;
                row += `<td class="${cls}">${diff}</td>`;
            });
            resBody.innerHTML += row + `</tr>`;
        });
        let htmlDeficit = `<tr class="summary-header"><td class="row-label">T別不足数合計</td>`;
        TIERS.forEach(t => htmlDeficit += `<td>${tDeficits[t]}</td>`);
        sumBody.innerHTML += htmlDeficit + `</tr>`;
        let htmlFinal = `<tr class="summary-header"><td class="row-label">ボックス考慮後</td>`;
        TIERS.forEach(t => {
            const boxCount = parseInt(document.getElementById(`box-${t}`).value) || 0;
            const finalVal = tDeficits[t] + boxCount;
            let cls = finalVal < 0 ? "bg-red" : (finalVal < 100 ? "bg-yellow" : "bg-green");
            htmlFinal += `<td class="${cls}">${finalVal}</td>`;
        });
        sumBody.innerHTML += htmlFinal + `</tr>`;
        resArea.style.display = 'block';
        localStorage.setItem(STORAGE_KEY, generateDataString());
    }

    function showExportModal() {
        const b64 = generateDataString();
        document.getElementById('jumon-str').innerText = b64;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    async function copyToClipboard(type) {
        const jumon = document.getElementById('jumon-str').innerText;
        const text = type === 'url' ? window.location.origin + window.location.pathname + "#" + jumon : jumon;
        try {
            await navigator.clipboard.writeText(text);
            alert("コピーしました！");
        } catch (err) { alert("コピーに失敗しました。"); }
    }

    function toggleJumonInput() {
        const area = document.getElementById('jumon-input-area');
        area.style.display = (area.style.display === "none" || area.style.display === "") ? "block" : "none";
        if(area.style.display === "block") document.getElementById('jumon-text-input').focus();
    }

    function restoreFromJumon() {
        let jumon = document.getElementById('jumon-text-input').value.trim();
        if (jumon.includes('#')) jumon = jumon.split('#')[1];
        if (loadFromDataString(jumon)) {
            alert("ふっかつしました！");
            document.getElementById('jumon-input-area').style.display = "none";
            runCalculation();
        } else { alert("エラー：じゅもんが正しくありません。"); }
    }

    async function generateCanvas() {
        const target = document.getElementById('capture-target');
        const wrapper = document.getElementById('table-wrapper');
        wrapper.classList.add('no-scroll');
        const canvas = await html2canvas(target, { backgroundColor: "#ffffff", scale: 2 });
        wrapper.classList.remove('no-scroll');
        return canvas;
    }

    async function takeScreenshot() {
        try {
            const canvas = await generateCanvas();
            const link = document.createElement('a');
            const now = new Date();
            link.href = canvas.toDataURL("image/png");
            link.download = `装備在庫カンリくん_${now.getMonth()+1}月${now.getDate()}日.png`;
            link.click();
        } catch (e) { alert("保存に失敗しました。"); }
    }

    async function copyScreenshot() {
        const btn = document.getElementById('copy-btn');
        try {
            const canvas = await generateCanvas();
            canvas.toBlob(async (blob) => {
                if (!blob) return;
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    await navigator.clipboard.write(data);
                    const oldText = btn.innerText; btn.innerText = "コピー完了！"; btn.style.backgroundColor = "#28a745";
                    setTimeout(() => { btn.innerText = oldText; btn.style.backgroundColor = "#6c757d"; }, 2000);
                } catch (e) { alert("コピーに失敗しました。HTTPS環境で試してください。"); }
            }, "image/png");
        } catch (err) { alert("失敗しました。"); }
    }
    window.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
